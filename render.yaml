# ═════════════════════════════════════════════════════════════════
# SnapSave Pro Backend - Render.com Blueprint
# ═════════════════════════════════════════════════════════════════

services:
  - type: web
    name: snapsave-pro-backend
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/snapsave-pro-backend
    branch: main
    plan: free
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    
    healthCheckPath: /health
    autoDeploy: true
    
